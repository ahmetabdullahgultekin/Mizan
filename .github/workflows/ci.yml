name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mizan
          POSTGRES_PASSWORD: mizan
          POSTGRES_DB: mizan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://mizan:mizan@localhost:5432/mizan_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: "ci-test-key-not-production"

    steps:
      - uses: actions/checkout@v4

      - name: Create PostgreSQL extensions
        run: |
          PGPASSWORD=mizan psql -h localhost -U mizan -d mizan_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=mizan psql -h localhost -U mizan -d mizan_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linting with Ruff
        run: |
          ruff check src/ tests/

      - name: Run type checking with MyPy
        run: |
          mypy src/mizan --ignore-missing-imports

      - name: Run tests with pytest
        run: |
          pytest --cov=src/mizan --cov-report=xml --cov-report=term-missing --cov-fail-under=50

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mizan:test -f docker/Dockerfile .

      - name: Test Docker image
        run: |
          docker run --rm mizan:test python -c "from mizan.domain.services import AbjadCalculator; print('Import successful')"

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -ll

      - name: Check for known vulnerabilities
        run: |
          pip install -e .
          safety check
