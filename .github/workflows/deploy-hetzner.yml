name: Deploy to Hetzner VPS

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'website/**'
      - 'Dockerfile*'
      - 'docker-compose.prod.yml'
      - 'requirements*.txt'
      - 'alembic/**'
  workflow_dispatch:

concurrency:
  group: deploy-mizan
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Mizan
    runs-on: ubuntu-latest
    needs: []
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/projects/Mizan
            git pull origin master
            cd /root/projects
            ./infra/deploy.sh build mizan
            ./infra/deploy.sh restart mizan
            # Health check
            sleep 10
            curl -sf https://mizan-api.rollingcatsoftware.com/health || exit 1
            curl -sf -o /dev/null https://mizan.rollingcatsoftware.com || exit 1
            echo "Mizan deployed successfully"
