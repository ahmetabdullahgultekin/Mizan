name: Deploy API to GCE

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/deploy-gce.yml'

jobs:
  build-and-deploy:
    name: Build, push, and deploy to Compute Engine
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: us-central1
      INSTANCE_NAME: ${{ vars.GCE_INSTANCE_NAME }}
      INSTANCE_ZONE: ${{ vars.GCE_INSTANCE_ZONE }}
      IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/mizan/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -f docker/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to GCE instance
        run: |
          gcloud compute ssh ${{ env.INSTANCE_NAME }} \
            --zone=${{ env.INSTANCE_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --command="
              IMAGE=${{ env.IMAGE }}:${{ github.sha }}
              gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
              docker pull \$IMAGE
              docker stop mizan-api || true
              docker rm mizan-api || true
              docker run -d \
                --name mizan-api \
                --restart unless-stopped \
                -p 8000:8000 \
                --env-file /opt/mizan/.env \
                \$IMAGE
              docker image prune -f
            "
