# Fly.io configuration for Mizan API
# Run `fly apps create mizan-api` once to register the app name.
# Set secrets with: fly secrets set DATABASE_URL=... REDIS_URL=... etc.

app = "mizan-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONPATH = "/app/src"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
