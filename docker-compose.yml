services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mizan-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mizan}:${POSTGRES_PASSWORD:-mizan}@db:5432/${POSTGRES_DB:-mizan}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    command: >
      uvicorn mizan.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - mizan-network

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILD=true
    container_name: mizan-website
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - mizan-network

  db:
    image: pgvector/pgvector:pg15
    container_name: mizan-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mizan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mizan}
      POSTGRES_DB: ${POSTGRES_DB:-mizan}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mizan} -d ${POSTGRES_DB:-mizan}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mizan-network

  redis:
    image: redis:7-alpine
    container_name: mizan-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mizan-network

volumes:
  postgres-data:
  redis-data:

networks:
  mizan-network:
    driver: bridge
